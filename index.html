<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <main>

        <header id="aside-card">
            <img src="assets/Logo.png" alt="Imagem bombinha de festa">
            <h1>Festivite</h1>
            <p class="text-heading">Crie um convite digital para o seu evento</p>
        </header>

        <section id="body-form">

            <h2 id="invite">Crie seu convite</h2>
            <form action="" id="about-event">
                
                <div class="text-header about-text">
                    <img src="assets/calendar.svg" alt="Icone Calendário">
                    <p>Sobre o evento</p>
                </div>

                <div id="name-space">
                    <label for="event-name">Título</label>
                    <input type="text" name="event-name" id="event-name" placeholder="Nome do Evento">
                </div>

                <div id="start-space">
                    <label for="start">Início</label>
                    <input type="datetime-local" name="start-date" id="start">
                </div>

                <div id="end-space">
                    <label for="end">Fim</label>
                    <input type="datetime-local" name="end-date" id="end">
                </div>

                <div id="type-space">
                    <p id="type">Tipo</p>
                    <div id="button-type">
                        <label for="presential" id="presential-icon">
                            <input type="radio" name="presencial" id="presential" checked>
                            Presencial</input>
                            <div id="div-hover"></div>
                        </label>
                        <label for="online" id="online-icon"><input type="radio" name="presencial" id="online"> Online</label>
                    </div>
                </div>

                <div id="local-space">
                    <label for="local">Local</label>
                    <input type="text" name="local-adress" id="local" placeholder="Link ou Endereço">
                </div>

                <div id="description-space">
                    <label for="description">Descrição</label>
                    <textarea name="description" id="description" placeholder="Escreva sobre os detalhes do evento"></textarea>
                </div>
            </form>

            <form action="" id="customization">
                <h2>Personalização</h2>
                
                <div>
                    <p>Cor principal</p>
                    <div>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                        <label for=""><input type="checkbox" name="" id=""></label>
                    </div>
                </div>

                <div>
                    <p>Tema do Evento</p>
                    <div>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                        <label for=""><input type="radio" name="" id=""></label>
                    </div>
                </div>

                <div>
                
                    <div>
                        <p>Estilo</p>
                        <label for=""><input type="checkbox" name="" id=""></label>
                    </div>

                    <div>
                        <p>Foto de Capa</p>
                        <div>
                            <label for=""><input type="file" name="" id=""></label>
                            <p>Nenhum arquivo selecionado</p>
                        </div>
                    </div>

                </div>
            </form>
        </section>

    </main>
</body>
</html>
