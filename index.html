<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Convite</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <main>

        <header id="aside-card">
            <img src="assets/Logo.png" alt="Imagem bombinha de festa">
            <h1>Festivite</h1>
            <p class="text-heading">Crie um convite digital para o seu evento</p>
        </header>

        <section id="body-form">

            <h2 id="invite">Crie seu convite</h2>
            <form action="" id="about-event">
                
                <div class="text-header about-text">
                    <img src="assets/calendar.svg" alt="Icone Calendário">
                    <p>Sobre o evento</p>
                </div>

                <div id="name-space">
                    <label for="event-name">Título</label>
                    <input type="text" name="event-name" id="event-name" placeholder="Nome do Evento">
                </div>

                <div id="start-space">
                    <label for="start">Início</label>
                    <input type="datetime-local" name="start-date" id="start">
                </div>

                <div id="end-space">
                    <label for="end">Fim</label>
                    <input type="datetime-local" name="end-date" id="end">
                </div>

                <div id="type-space">
                    <p id="type">Tipo</p>
                    <div id="button-type">
                        <label for="presential" id="presential-icon">
                            <input type="radio" name="presencial" id="presential" checked>
                            Presencial</input>
                            <div id="div-hover"></div>
                        </label>
                        <label for="online" id="online-icon"><input type="radio" name="presencial" id="online"> Online</label>
                    </div>
                </div>

                <div id="local-space">
                    <label for="local">Local</label>
                    <input type="text" name="local-adress" id="local" placeholder="Link ou Endereço">
                </div>

                <div id="description-space">
                    <label for="description">Descrição</label>
                    <textarea name="description" id="description" placeholder="Escreva sobre os detalhes do evento"></textarea>
                </div>
            </form>

            <form action="" id="customization">
                <h2>Personalização</h2>
                
                <div id="main-color">
                    <p>Cor principal</p>
                    <div class="palette">
                        <label for="blue" id="blue"><input type="checkbox" name="" id="blue" class="azul" checked></label>
                        <label for="navy" id="navy"><input type="checkbox" name="" id="navy"></label>
                        <label for="purple" id="purple"><input type="checkbox" name="" id="purple"></label>
                        <label for="fuschia" id="fuschia"><input type="checkbox" name="" id="fuschia"></label>
                        <label for="pink" id="pink"><input type="checkbox" name="" id="pink"></label>
                        <label for="danger" id="danger"><input type="checkbox" name="" id="danger"></label>
                        <label for="orange" id="orange"><input type="checkbox" name="" id="orange"></label>
                        <label for="yellow" id="yellow"><input type="checkbox" name="" id="yellow"></label>
                        <label for="lime" id="lime"><input type="checkbox" name="" id="lime"></label>
                        <label for="green" id="green"><input type="checkbox" name="" id="green"></label>
                        <label for="cyan" id="cyan"><input type="checkbox" name="" id="cyan"></label>
                    </div>
                </div>

                <div>
                    <p>Tema do Evento</p>
                    <div class="event-theme">

                        <label for="event-card">
                            <img src="assets/aniversario.svg" alt="">
                            <span>Aniversário</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/infantil.svg" alt="">
                            <span>Infantil</span>
                            <input type="radio" name="event-card" id="">
                        </label>
                        
                        <label for="event-card">
                            <img src="assets/formatura.svg" alt="">
                            <span>Formatura</span>
                            <input type="radio" name="event-card" id="">
                        </label>
                        
                        <label for="event-card">
                            <img src="assets/casamento.svg" alt="">
                            <span>Casamento</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/baby.svg" alt="">
                            <span>Chá de bebê</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/panela.svg" alt="">
                            <span>Chá de panela</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/carnaval.svg" alt="">
                            <span>Carnaval</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/pascoa.svg" alt="">
                            <span>Páscoa</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/sao-joao.svg" alt="">
                            <span>São João</span>
                            <input type="radio" name="event-card" id="">
                        </label>
                        
                        <label for="event-card">
                            <img src="assets/halloween.svg" alt="">
                            <span>Halloween</span>
                            <input type="radio" name="event-card" id="">
                        </label>
                        
                        <label for="event-card">
                            <img src="assets/natal.svg" alt="">
                            <span>Natal</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                        <label for="event-card">
                            <img src="assets/outro.svg" alt="">
                            <span>Outro</span>
                            <input type="radio" name="event-card" id="">
                        </label>

                    </div>
                </div>

                <div>
                
                    <div id="main-dark">
                        <p>Estilo</p>
                        <label for="mode" id="dark-mode">
                            <div id="dark-mode-button"></div>
                            <input type="checkbox" name="" id="mode">
                            <p id="light-text">Claro</p>
                            <p id="dark-text">Escuro</p>
                        </label>
                        
                    </div>

                    <div>
                        <p>Foto de Capa</p>
                        <div>
                            <label for=""><input type="file" name="" id=""></label>
                            <p>Nenhum arquivo selecionado</p>
                        </div>
                    </div>

                </div>
            </form>
        </section>

    </main>
</body>
</html>
